name: "Recensio"
description: "Staff-engineer-depth PR review agent powered by the Claude API. Inline findings, suggestion blocks, @recensio re-reviews."
author: "recensio"

inputs:
  anthropic-api-key:
    description: "Anthropic API key used to run the review"
    required: true
  github-token:
    description: "Token used to read the PR and post the review"
    required: false
    default: ${{ github.token }}
  model:
    description: "Claude model id"
    required: false
    default: "claude-opus-4-8"
  effort:
    description: "Reasoning effort: low | medium | high | xhigh | max"
    required: false
    default: "xhigh"
  min-loc:
    description: "Size-gate threshold in changed LOC (additions + deletions, excluding lockfiles/generated/vendored); applies to auto reviews only"
    required: false
    default: "500"
  auto-review:
    description: "Also review automatically on PR opened/ready/reopened events (requires the pull_request trigger in your workflow). Off by default: reviews run only when a collaborator comments @recensio."
    required: false
    default: "false"
  review-on-synchronize:
    description: "With auto-review on, also review every push to the PR (the synchronize event)"
    required: false
    default: "false"
  never-approve:
    description: "Post approval verdicts as COMMENT instead of APPROVE"
    required: false
    default: "false"
  max-turns:
    description: "Cap on agent tool-use turns before the review is forced to conclude"
    required: false
    default: "40"
  max-reviews-per-hour:
    description: "Per-repo cap on review runs per rolling hour (0 disables). Needs `actions: read` in the workflow permissions; without it the check is skipped with a warning."
    required: false
    default: "8"

outputs:
  verdict:
    description: "APPROVE | APPROVE_WITH_COMMENTS | REQUEST_CHANGES | BLOCK (empty when skipped)"
  review-url:
    description: "URL of the posted review or comment"
  skipped:
    description: "true when no review was performed (size gate, draft, or non-trigger event)"

runs:
  using: "node24"
  main: "dist/index.js"

branding:
  icon: "eye"
  color: "purple"
