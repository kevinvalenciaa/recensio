# Recensio — PR review agent (manual trigger)
# Copy this file to .github/workflows/recensio.yml in any repository, then add
# an ANTHROPIC_API_KEY secret (Settings → Secrets and variables → Actions).
#
# A review runs when a collaborator with write access comments "@recensio"
# (or "/recensio") on a pull request. Nothing runs automatically.

name: Recensio

on:
  issue_comment:
    types: [created]
  # To ALSO review automatically when PRs open, uncomment this block and set
  # auto-review: "true" below. Note: for PRs from forks the default token is
  # read-only (see the fork notes in the README).
  # pull_request:
  #   types: [opened, ready_for_review, reopened]

# One review at a time per PR; a newer trigger cancels a stale in-flight run.
concurrency:
  group: recensio-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read # clone the PR head
  pull-requests: write # post reviews and inline comments
  issues: write # error notices and the 👀 reaction
  actions: read # count recent runs for the reviews-per-hour limit

jobs:
  review:
    # Cheap prefilter; the action itself does the authoritative word-boundary
    # match, bot filtering, and write-permission check.
    if: >-
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request && contains(github.event.comment.body, 'recensio'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: YOUR_GITHUB_USERNAME/recensio@v1 # ← point at your copy of the recensio repo
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          # auto-review: "true"          # review PR open/ready/reopen events too
          # review-on-synchronize: "true"  # with auto-review: also review every push
          # model: claude-opus-4-8
          # effort: xhigh                # low | medium | high | xhigh | max
          # min-loc: "500"               # size-gate threshold for auto reviews
          # never-approve: "true"        # post approvals as comments
