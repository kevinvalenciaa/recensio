# Optional Recensio config. Place at the root of your DEFAULT branch.
# It is read from the default branch (never the PR head), so a pull request
# cannot change how it gets reviewed. All keys are optional.

# Path-scoped review guidance: applied when a changed file matches the glob.
instructions:
  - path: "src/api/**"
    guidance: "Every handler must authenticate, authorize, and validate input with zod before any DB access."
  - path: "**/*.sql"
    guidance: "Flag any non-transactional multi-statement change; migrations must be reversible."
  - path: "**/*.test.ts"
    guidance: "New behavior needs a test; error paths must be asserted, not just the happy path."

# Globs to exclude from review entirely (also removed from the size-gate LOC).
ignore:
  - "src/generated/**"
  - "**/*.pb.go"
  - "**/__snapshots__/**"

# Checks run against the PR's checked-out code; their output is given to the
# reviewer as ground truth. THIS EXECUTES YOUR REPO'S CODE, so it runs on
# same-repo PRs only (never forks / pull_request_target), with a scrubbed env
# (no API tokens) and per-command timeouts. Commands are whitespace-split and
# run without a shell — keep them simple. Omit this block to run nothing.
# checks:
#   install: "npm ci --ignore-scripts"
#   commands:
#     - "npx tsc --noEmit"
#     - "npx eslint ."
