# Dogfood: Recensio reviews PRs to its own repository on demand — comment
# @recensio on a PR. Runs from the checked-out working tree (uses: ./).
# Requires the ANTHROPIC_API_KEY secret.
name: Recensio

on:
  issue_comment:
    types: [created]

concurrency:
  group: recensio-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  review:
    if: github.event.issue.pull_request && contains(github.event.comment.body, 'recensio')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
