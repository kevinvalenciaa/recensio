name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Verify committed dist/ is current
        run: |
          if ! git diff --exit-code -- dist/; then
            echo "::error::dist/ is stale — run 'npm run build' and commit the result"
            exit 1
          fi
      - name: Smoke-check bundles
        run: |
          node --check dist/index.js
          node dist/cli.js --help
